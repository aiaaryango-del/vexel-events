<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - {{ event.title }}</title>

```
<script src="https://cdn.tailwindcss.com"></script>
```

</head>

<body class="bg-gray-100">

```
<div class="min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-sm border p-8">

        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-gray-900">
                Event Registration
            </h1>

            <p class="mt-3 text-gray-600">
                {{ event.title }}
            </p>

            <p class="text-sm text-gray-500 mt-2">
                📅 {{ event.date }} | 📍 {{ event.venue }}
            </p>

        </div>

        <form method="POST" class="space-y-5">

            <!-- Full Name -->
            <div>
                <label class="block mb-2 font-medium">
                    Full Name *
                </label>

                <input
                    type="text"
                    name="full_name"
                    required
                    class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-black"
                >
            </div>

            <!-- Phone -->
            <div>
                <label class="block mb-2 font-medium">
                    Phone Number *
                </label>

                <input
                    type="tel"
                    name="phone"
                    required
                    class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-black"
                >
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-2 font-medium">
                    Email Address *
                </label>

                <input
                    type="email"
                    name="email"
                    required
                    class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-black"
                >
            </div>

            <!-- Profession -->
            <div>
                <label class="block mb-2 font-medium">
                    Profession *
                </label>

                <input
                    type="text"
                    name="profession"
                    required
                    class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-black"
                >
            </div>

            <!-- Company -->
            <div>
                <label class="block mb-2 font-medium">
                    Company Name *
                </label>

                <input
                    type="text"
                    name="company_name"
                    required
                    class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-black"
                >
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full bg-black text-white py-4 rounded-xl font-semibold hover:bg-gray-800 transition"
            >
                Complete Registration
            </button>

        </form>

    </div>

</div>
```

</body>
</html>
