<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>

```
<script src="https://cdn.tailwindcss.com"></script>
```

</head>

<body class="bg-gray-100">

```
<div class="min-h-screen flex items-center justify-center px-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-sm border p-10 text-center">

        <div class="mb-6">

            <div class="text-6xl">
                ✅
            </div>

        </div>

        <h1 class="text-4xl font-bold text-gray-900">
            Registration Successful!
        </h1>

        <p class="mt-4 text-gray-600">
            Thank you for registering for the event.
        </p>

        <div class="mt-8 bg-gray-50 border rounded-xl p-6 text-left">

            <h2 class="text-2xl font-semibold mb-4">
                Event Details
            </h2>

            <p class="mb-3">
                <strong>Event:</strong>
                {{ event.title }}
            </p>

            <p class="mb-3">
                <strong>Date:</strong>
                {{ event.date }}
            </p>

            <p class="mb-3">
                <strong>Venue:</strong>
                {{ event.venue }}
            </p>

        </div>

        <div class="mt-8">

            <a
                href="{{ url_for('event_page', slug=event.slug) }}"
                class="inline-block bg-black text-white px-8 py-4 rounded-xl font-semibold hover:bg-gray-800"
            >
                Back to Event Page
            </a>

        </div>

    </div>

</div>
```

</body>
</html>
